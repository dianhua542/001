
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订单拨号表</title>
<style>
body{font-size:16px;padding:10px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:10px;text-align:center;}
th{background:#f0f0f0;}
a{color:#0066cc;text-decoration:none;font-weight:bold;}
.status{background:#d4edda;color:#000;font-weight:bold;}
.status.done{background:#f8d7da;color:#000;}
</style>
<script>
function makeCall(el, phone) {
    el.parentNode.className = "status done";
    el.innerText = "已拨打";
    window.location.href = "tel:" + phone;
}
</script>
</head>
<body>
<h3>订单拨号列表</h3>
<table>
<tr>
  <th>序号</th>
  <th>订单号</th>
  <th>手机号</th>
  <th>状态</th>
</tr>

<tr>
  <td>1</td>
  <td>6952236262807835824</td>
  <td>17896705357,5213</td>
  <td class="status">
    <a href="javascript:;" onclick="makeCall(this,'17896705357,5213')">一键拨号</a>
  </td>
</tr>

</table>
</body>
</html>
